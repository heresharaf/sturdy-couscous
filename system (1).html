#simple-login-overlay {
    position: fixed;

<body>
<!-- Simple Login Protection -->
<div id="simple-login-overlay">
    <div class="login-box">
        <h2>🔐 Enter Password</h2>
        <input type="password" id="login-pass" placeholder="Your password...">
        <button class="login-btn" onclick="checkPassword()">Unlock Website</button>
        <div class="error" id="login-error">❌ Wrong password!</div>
    </div>
</div>

<script>
function checkPassword() {
    const password = document.getElementById('login-pass').value.trim().toLowerCase();
    const correctPassword = 'i love you';  // CHANGE THIS TO YOUR PASSWORD
    
    if (password === correctPassword) {
        // Hide login - show website
        document.getElementById('simple-login-overlay').style.display = 'none';
    } else {
        // Shake effect + error
        document.getElementById('login-error').style.display = 'block';
        const box = document.querySelector('.login-box');
        box.style.transform = 'translateX(0)';
        box.style.transition = 'transform 0.1s';
        setTimeout(() => {
            box.style.transform = 'translateX(10px)';
        }, 50);
        setTimeout(() => {
            box.style.transform = 'translateX(-10px)';
        }, 100);
        setTimeout(() => {
            box.style.transform = 'translateX(0)';
        }, 150);
        document.getElementById('login-pass').value = '';  // Clear input
    }
}

// Enter key support
document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
        checkPassword();
    }
});
</script>

                p: "दुनिया की सारी परेशानियां तुम्हारी गोद में सिर रखते ही खत्म हो जाती हैं।",

                btn: "मेरा खत खोलें ✉️", 
                gift: "मेरा पूरा दिल और वफ़ा। ❤️", 
                img: "https://images.unsplash.com/photo-1518895949257-7621c3c786d7?w=600", 
                color: "#800000" 
            }
        ];

        let state = { currentIndex: 0, isMusicPlaying: false };

        function init() {
            renderCards();
            setupStars();
            showCard(0);
            document.getElementById('musicToggle').addEventListener('click', toggleMusic);
        }

        function renderCards() {
            const wrapper = document.getElementById('card-wrapper');
            siteData.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = `content-card`;
                card.id = `card-${i}`;
                card.innerHTML = `
                    <h1>${item.title}</h1>
                    <div class="hindi-text" id="typewriter-${i}"></div>
                    <div class="btn-group">
                        <button class="action-btn btn-gift" onclick="openGift(${i})">🎁 उपहार खोलें</button>
                        <button class="action-btn btn-next" onclick="nextPage()">${item.btn}</button>
                    </div>
                `;
                wrapper.appendChild(card);
            });
        }

        function showCard(index) {
            const currentCard = document.querySelector('.content-card.active');
            if(currentCard) {
                gsap.to(currentCard, { 
                    opacity: 0, scale: 0.8, duration: 0.5, 
                    onComplete: () => currentCard.classList.remove('active') 
                });
            }

            const nextCard = document.getElementById(`card-${index}`);
            nextCard.classList.add('active');
            gsap.fromTo(nextCard, 
                { opacity: 0, scale: 1.2, z: -100 },
                { opacity: 1, scale: 1, z: 0, duration: 1, ease: "power2.out" }
            );

            document.getElementById('progress-fill').style.width = ((index + 1) / siteData.length * 100) + "%";
            document.getElementById('dynamic-gradient').style.background = siteData[index].color;
            typeEffect(`typewriter-${index}`, siteData[index].p);
        }

        function typeEffect(elementId, text) {
            const el = document.getElementById(elementId);
            el.innerHTML = "";
            let i = 0;
            const timer = setInterval(() => {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i); i++;
                } else { clearInterval(timer); }
            }, 50);
        }

        function nextPage() {
            if(state.currentIndex === 0 && !state.isMusicPlaying) toggleMusic();
            
            if(state.currentIndex < siteData.length - 1) {
                state.currentIndex++;
                showCard(state.currentIndex);
                confetti({ particleCount: 30, spread: 50, origin: { y: 0.8 } });
            } else {
                showFinalLetter();
            }
        }

        function openGift(i) {
            const modal = document.getElementById('giftModal');
            document.getElementById('giftImg').src = siteData[i].img;
            document.getElementById('giftTitle').innerText = siteData[i].gift;
            modal.style.display = "flex";
            gsap.to("#giftBox", { scale: 1, opacity: 1, duration: 0.5, ease: "back.out" });
            confetti({ particleCount: 100, spread: 70 });
        }

        function closeGift() {
            gsap.to("#giftBox", { scale: 0.7, opacity: 0, duration: 0.3, onComplete: () => {
                document.getElementById('giftModal').style.display = "none";
            }});
        }

        function showFinalLetter() {
            const letter = document.getElementById('final-letter');
            letter.style.display = "block";
            gsap.to(letter, { scale: 1, duration: 1, ease: "elastic.out(1, 0.5)" });
            fireworksLoop();
        }

        function toggleMusic() {
            const audio = document.getElementById('bgMusic');
            const btn = document.getElementById('musicToggle');
            if (audio.paused) {
                audio.play(); state.isMusicPlaying = true;
                btn.classList.add('playing'); btn.innerText = "⏸️";
            } else {
                audio.pause(); state.isMusicPlaying = false;
                btn.classList.remove('playing'); btn.innerText = "🎵";
            }
        }

        function setupStars() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const stars = [];
            for(let i=0; i<150; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, v: Math.random()*0.5 });
            function animate() {
                ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="white";
                stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y -= s.v; if(s.y<0) s.y=canvas.height; });
                requestAnimationFrame(animate);
            }
            animate();
        }

        setInterval(() => {
            const h = document.createElement("div");
            h.className = "floating-heart"; h.innerHTML = "❤️";
            h.style.left = Math.random() * 100 + "vw";
            h.style.fontSize = (Math.random() * 20 + 10) + "px";
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 7000);
        }, 1000);

        function fireworksLoop() {
            const end = Date.now() + (15 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        window.onload = init;
    </script>
